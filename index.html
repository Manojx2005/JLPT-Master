<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Master — Japanese Language Study App</title>

    <link rel="manifest" href="%BASE_URL%manifest.json">
    <meta name="theme-color" content="#17140F">
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg">

    <!-- Installable PWA / iOS home-screen support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JLPT Master">
    <link rel="apple-touch-icon" href="%BASE_URL%icon.svg">
    <meta name="description"
        content="A premium JLPT study companion with dictionary search, timed exams N5 to N1, and custom question support.">

    <!-- Fonts: Shippori Mincho (display serif, brush-derived) + Zen Kaku Gothic New (UI sans).
         Both carry full Japanese glyph coverage via Google Fonts unicode-range subsetting. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- ============================================================
         Global libraries used by the data/engine layer (public/*.js)
         and by some components. These run as classic scripts BEFORE the
         React module bundle, so the globals exist when the app boots.
         React, ReactDOM and DOMPurify are NOT here — they're npm
         dependencies imported inside src/ and bundled by Vite.
         ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js" integrity="sha384-iseUZMjd63Pz0jb9In72RWfpJu8HrPFrK7K99+pPQmcDg2CgHIo2NdxWhrhejqRo" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js" integrity="sha384-+/4lqMnmLqwbdHXshvGDmBTeWlNoPRdjXi4ZsiBj10EhQXaTBe3RF5JZktdSjug6" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js" integrity="sha384-f6/UpzjTjIXASlp20cArQsaRh1EvHVJd5kegy/gYR9W2D0a32TnEqUEiW4Zm/5O0" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js" integrity="sha384-nFoSjZIoH3CCp8W639jJyQkuPHinJ2NHe7on1xvlUA7SuGfJAfvMldrsoAVm6ECz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" integrity="sha384-HAH79XdRvHr6axVGh4xQWVCp14kcd32bNk4Xu0sHDHtFQ42n6BAM8ykvB47dGz6D" crossorigin="anonymous"></script>

    <!-- Data + engines (vocabulary DB, SRS, grammar, auth, parsers).
         Kept as global scripts so the React layer can read them as it
         does today. They live in public/ and are served as-is. -->
    <script src="%BASE_URL%data.js?v=2"></script>
    <script src="%BASE_URL%native.js?v=2"></script>
    <script src="%BASE_URL%n2test_data.js?v=2"></script>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true"></div>

    <div id="root"></div>

    <!-- React app entry — bundled by Vite (imports React/ReactDOM/DOMPurify from npm) -->
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
