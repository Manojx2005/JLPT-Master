<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#0f0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B85FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF6584"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (safe for purpose: "any maskable") -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Soft glow orbs echoing the app background -->
  <circle cx="120" cy="110" r="120" fill="#6C63FF" opacity="0.18"/>
  <circle cx="410" cy="420" r="140" fill="#FF6584" opacity="0.12"/>
  <!-- Rounded badge (within maskable safe zone: center 80%) -->
  <rect x="96" y="96" width="320" height="320" rx="72" fill="url(#accent)"/>
  <!-- 語 = "language" -->
  <text x="256" y="278" text-anchor="middle" dominant-baseline="middle"
        font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif"
        font-size="200" font-weight="700" fill="#ffffff">語</text>
</svg>
