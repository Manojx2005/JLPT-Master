<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding: UTF-8 supports Japanese characters (Kanji, Hiragana, Katakana) -->
    <meta charset="UTF-8">

    <!-- Responsive viewport: ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in browser tab and search engine results -->
    <title>JLPT Master — Japanese Language Study App</title>

    <!-- PWA Manifest and Theme Color -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6C63FF">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- SEO meta description for search engine result snippets -->
    <meta name="description"
        content="A premium JLPT study companion with dictionary search, timed exams N5 to N1, and custom question support.">

    <!-- ============================================================
         Google Fonts
         - Outfit: Primary Latin font (weights 300–800 for UI text)
         - Noto Sans JP: Japanese font (weights 400, 500, 700)
         - display=swap: Prevents invisible text while fonts load (FOIT)
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Application stylesheet: contains design tokens, component styles, and responsive rules -->
    <link rel="stylesheet" href="styles.css?v=36">

    <!-- ============================================================
         React 18 via CDN (Production builds, no JSX compiler needed)
         - react.production.min.js: Core React library (hooks, component model)
         - react-dom.production.min.js: DOM rendering (createRoot, render)
         Note: This app uses React.createElement() instead of JSX
         ============================================================ -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Firebase SDKs (compat for easier global access) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <!-- PDF.js is lazy-loaded by features.js only when a PDF is uploaded
         (saves ~400 KB on the initial page load) -->
</head>

<body>
    <!-- ============================================================
         Animated Background Orbs
         Three blurred gradient circles that float behind the app content,
         creating a dynamic, premium dark-mode ambiance.
         Styled and animated via CSS (.bg-canvas, .bg-orb, @keyframes orbFloat)
         ============================================================ -->
    <div class="bg-canvas">
        <div class="bg-orb bg-orb--1"></div> <!-- Purple orb (top-left) -->
        <div class="bg-orb bg-orb--2"></div> <!-- Pink orb (bottom-right) -->
        <div class="bg-orb bg-orb--3"></div> <!-- Violet orb (center) -->
    </div>

    <!-- React mount point: the entire single-page app renders inside this div -->
    <div id="root"></div>

    <!-- ============================================================
         Application Scripts (order matters — data must load before app)
         1. data.js  — JLPT_VOCAB array (~1000 vocabulary entries, N5→N1)
         2. js/*.js  — React components (split into feature modules)
         ============================================================ -->
    <!-- Mammoth.js for parsing DOCX files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- DOMPurify: sanitises any HTML/SVG rendered via dangerouslySetInnerHTML (XSS protection) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <script src="data.js?v=36"></script>
    <!-- Load custom quiz definitions -->
    <script src="features.js?v=36"></script>
    <script src="n2test_data.js?v=36"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- ============================================================
         Application logic — split from the original monolithic app.js
         into feature modules for readability. Order matters: 01-core
         defines the shared helpers/aliases every other module uses,
         and 07-app mounts the React tree last.
         ============================================================ -->
    <script src="js/01-core.js?v=36"></script>
    <script src="js/02-dictionary.js?v=36"></script>
    <script src="js/03-quiz.js?v=36"></script>
    <script src="js/04-study.js?v=36"></script>
    <script src="js/05-exams.js?v=36"></script>
    <script src="js/06-multiplayer.js?v=36"></script>
    <script src="js/07-app.js?v=36"></script>
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js')
                    .then(function (registration) {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, function (err) {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
